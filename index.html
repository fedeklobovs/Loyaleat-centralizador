    return bd?.locales && bd?.localesSobreTotal ? (bd.locales / bd.localesSobreTotal) * 100 : null;
  }
  return bd?.hasData ? bd[kpiId] : kpiId === "locales" ? bd?.locales : null;
}
function aggregate(monthData, kpiId) {
  const kpi = KPI_MAP[kpiId];
  if (kpi.agg === "sum_all") return BRANDS.reduce((s, b) => s + (monthData[b.id]?.locales || 0), 0);
  const valid = BRANDS.map((b) => monthData[b.id]).filter((b) => b?.hasData);
  if (valid.length === 0) return null;
  if (kpi.agg === "sum") return valid.reduce((s, b) => s + (b[kpiId] || 0), 0);
  const vals = valid.map((b) => getVal(b, kpiId)).filter((v) => v !== null && v !== undefined && !isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((s, v) => s + v, 0) / vals.length;
}
function fmt(kpiId, val) {
  if (val === null || val === undefined || isNaN(val)) return "–";
  const kpi = KPI_MAP[kpiId];
  if (kpi.unit === "pct") return val.toLocaleString("es-AR", { maximumFractionDigits: 1 }) + "%";
  if (kpi.unit === "ratio") return val.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return Math.round(val).toLocaleString("es-AR");
}
function delta(kpiId, curr, prev) {
  if (curr == null || prev == null || isNaN(curr) || isNaN(prev)) return null;
  const kpi = KPI_MAP[kpiId];
  if (kpi.unit === "pct") return curr - prev;
  if (prev === 0) return null;
  return ((curr - prev) / Math.abs(prev)) * 100;
}
function computeInsights(monthData, prevData) {
  const valid = BRANDS.filter((b) => monthData[b.id]?.hasData);
  const byPct = [...valid].sort((a, b) => monthData[b.id].pctRecurrentes - monthData[a.id].pctRecurrentes);
  const best = byPct[0]; const worst = byPct[byPct.length - 1];
  let grew = null, dropped = null;
  if (prevData) {
    const changes = valid.filter((b) => prevData[b.id]?.hasData)
      .map((b) => ({ brand: b, change: delta("clientes", monthData[b.id].clientes, prevData[b.id].clientes) }))
      .filter((c) => c.change !== null);
    if (changes.length) {
      grew = changes.reduce((a, c) => (c.change > a.change ? c : a), changes[0]);
      dropped = changes.reduce((a, c) => (c.change < a.change ? c : a), changes[0]);
    }
  }
  let topVolume = null, topFreq = null;
  if (valid.length) {
    topVolume = valid.reduce((a, b) => (monthData[b.id].clientes > monthData[a.id].clientes ? b : a), valid[0]);
    topFreq = valid.reduce((a, b) => (monthData[b.id].frecRec > monthData[a.id].frecRec ? b : a), valid[0]);
  }
  return { best, worst, grew, dropped, topVolume, topFreq };
}

/* ============================== CUSTOM CHARTS (SVG) ============================== */
function TrendChart({ data, brands, kpiId }) {
  const W = 760, H = 340, padL = 56, padR = 24, padT = 24, padB = 36;
  const months = data.map((d) => d.month);
  let allVals = [];
  data.forEach((row) => brands.forEach((id) => { if (row[id] != null) allVals.push(row[id]); }));
  let minV = allVals.length ? Math.min(...allVals) : 0;
  let maxV = allVals.length ? Math.max(...allVals) : 1;
  if (minV === maxV) { minV -= Math.abs(minV) * 0.2 + 1; maxV += Math.abs(maxV) * 0.2 + 1; }
  const padv = (maxV - minV) * 0.18;
  minV -= padv; maxV += padv;
  if (KPI_MAP[kpiId].unit !== "ratio" && minV < 0 && allVals.every((v) => v >= 0)) minV = 0;
  const xFor = (i) => (months.length <= 1 ? W / 2 : padL + (i / (months.length - 1)) * (W - padL - padR));
  const yFor = (v) => padT + (1 - (v - minV) / (maxV - minV)) * (H - padT - padB);
  const ticksN = 4;
  const tickVals = Array.from({ length: ticksN + 1 }, (_, i) => minV + (i / ticksN) * (maxV - minV));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full">
      {tickVals.map((tv, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={yFor(tv)} y2={yFor(tv)} stroke={C.line} strokeDasharray="3 3" />
          <text x={padL - 8} y={yFor(tv) + 4} textAnchor="end" fontSize="11" fill={C.inkSoft}>{fmt(kpiId, tv)}</text>
        </g>
      ))}
      {months.map((m, i) => <text key={i} x={xFor(i)} y={H - padB + 22} textAnchor="middle" fontSize="12" fill={C.inkSoft}>{m}</text>)}
      {brands.map((id) => {
        const pts = data.map((row, i) => (row[id] != null ? [xFor(i), yFor(row[id])] : null));
        const segs = []; let cur = [];
        pts.forEach((p) => { if (p) cur.push(p); else { if (cur.length > 1) segs.push(cur); cur = []; } });
        if (cur.length > 1) segs.push(cur);
        return (
          <g key={id}>
            {segs.map((seg, si) => <polyline key={si} points={seg.map((p) => p.join(",")).join(" ")} fill="none" stroke={BRAND_COLOR[id]} strokeWidth="2.5" />)}
            {pts.map((p, i) => p && (
              <g key={i}>
                <circle cx={p[0]} cy={p[1]} r="4" fill={BRAND_COLOR[id]} />
                <text x={p[0]} y={p[1] - 12} textAnchor="middle" fontSize="10" fontWeight="600" fill={BRAND_COLOR[id]} style={{ fontFamily: "IBM Plex Mono, monospace" }}>{fmt(kpiId, data[i][id])}</text>
              </g>
            ))}
          </g>
        );
      })}
    </svg>
  );
}
function RadarChartCustom({ rows, brands }) {
  const W = 460, H = 460, cx = W / 2, cy = H / 2, maxR = Math.min(W, H) / 2 - 78;
  const N = rows.length || 1;
  const angleFor = (i) => -Math.PI / 2 + (i / N) * 2 * Math.PI;
  const pointFor = (i, val) => { const r = (Math.max(0, Math.min(100, val)) / 100) * maxR; const a = angleFor(i); return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; };
  const rings = [25, 50, 75, 100];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full">
      {rings.map((rv, ri) => {
        const pts = Array.from({ length: N }, (_, i) => pointFor(i, rv));
        return <polygon key={ri} points={pts.map((p) => p.join(",")).join(" ")} fill="none" stroke={C.line} />;
      })}
      {rows.map((row, i) => {
        const a = angleFor(i);
        const [ex, ey] = [cx + maxR * Math.cos(a), cy + maxR * Math.sin(a)];
        const [lx, ly] = [cx + (maxR + 26) * Math.cos(a), cy + (maxR + 26) * Math.sin(a)];
        return (
          <g key={i}>
            <line x1={cx} y1={cy} x2={ex} y2={ey} stroke={C.line} />
            <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize="11" fill={C.inkSoft}>{row.kpi}</text>
          </g>
        );
      })}
      {brands.map((id) => {
        const pts = rows.map((row, i) => pointFor(i, row[id] != null ? row[id] : 0));
        return <polygon key={id} points={pts.map((p) => p.join(",")).join(" ")} fill={BRAND_COLOR[id]} fillOpacity="0.12" stroke={BRAND_COLOR[id]} strokeWidth="2" />;
      })}
    </svg>
  );
}

function PasswordGate({ children }) {
  const [unlocked, setUnlocked] = useState(() => { try { return localStorage.getItem(UNLOCK_KEY) === "1"; } catch (e) { return false; } });
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  function handleSubmit(e) {
    e.preventDefault();
    if (pw.trim() === APP_PASSWORD) { try { localStorage.setItem(UNLOCK_KEY, "1"); } catch (e) {} setUnlocked(true); }
    else setErr(true);
  }
  if (unlocked) return children;
  return (
    <div className="w-full flex items-center justify-center px-4" style={{ background: C.cream, minHeight: "100vh" }}>
      <form onSubmit={handleSubmit} className="rounded-xl p-8 w-full max-w-sm" style={{ background: C.card, border: `1px solid ${C.line}` }}>

          className="w-full rounded-lg px-3 py-2 mb-2 text-sm" style={{ background: C.cream, border: `1px solid ${err ? C.brick : C.line}`, color: C.ink }} />

}

                                <div className="flex flex-col items-end">
                                  <span className="font-mono">{fmt(k.id, val)}</span>
                                  {prevVal != null && val != null && <DeltaBadge kpiId={k.id} value={delta(k.id, val, prevVal)} />}
                                </div>
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot><tr>
                    <td className="sticky left-0 px-4 py-3 font-bold" style={{ background: C.blueSoft, color: C.blue }}>Total / Prom.</td>
                    {KPIS.map((k) => (
                      <td key={k.id} className="px-3 py-3 text-right font-mono font-bold" style={{ background: C.blueSoft, color: C.blue }}>
                        {fmt(k.id, aggregate(monthData, k.id))}
                        <div className="font-normal" style={{ fontSize: "9px", color: C.inkFaint, fontFamily: "Inter, sans-serif" }}>{isSumKpi(k.id) ? "TOTAL" : "PROMEDIO"}</div>
                      </td>
                    ))}
                  </tr></tfoot>
                </table>
              </div>
            </div>
            <div className="text-xs mt-2" style={{ color: C.inkFaint }}>Click en el nombre de un KPI para ordenar. Tante Sara, JB y Páru pagan el fee pero aún no usan la plataforma activamente.</div>
          </React.Fragment>
        )}

        {tab === "comparar" && (
          <React.Fragment>
            <div className="flex gap-1.5 rounded-full p-1 mb-5 w-fit" style={{ background: C.card, border: `1px solid ${C.line}` }}>
              {["tendencia", "radar"].map((s) => (
                <button key={s} onClick={() => setCompareSub(s)} className="rounded-full px-4 py-1.5 text-sm font-semibold capitalize" style={{ background: compareSub === s ? C.ink : "transparent", color: compareSub === s ? C.cremeLight : C.inkSoft }}>{s === "tendencia" ? "Tendencia mensual" : "Radar multi-KPI"}</button>
              ))}
            </div>
            <div className="mb-5">
              <div className="text-sm font-semibold mb-2" style={{ color: C.inkSoft }}>Marcas a comparar (máx. 6)</div>
              <div className="flex flex-wrap gap-2">
                {BRANDS.map((b) => <Chip key={b.id} active={compareBrands.includes(b.id)} color={BRAND_COLOR[b.id]} disabled={!monthData[b.id]?.hasData} onClick={() => toggleCompareBrand(b.id)}>{b.name}{!monthData[b.id]?.hasData ? " (sin datos)" : ""}</Chip>)}
              </div>
            </div>

            {compareSub === "tendencia" ? (
              <React.Fragment>
                <div className="mb-5">
                  <div className="text-sm font-semibold mb-2" style={{ color: C.inkSoft }}>KPI</div>
                  <select value={trendKpi} onChange={(e) => setTrendKpi(e.target.value)} className="rounded-lg px-3 py-2 text-sm font-medium" style={{ background: C.card, border: `1px solid ${C.line}`, color: C.ink }}>
                    {KPIS.map((k) => <option key={k.id} value={k.id}>{k.label}</option>)}
                  </select>
                </div>
                <div className="rounded-xl p-4" style={{ background: C.card, border: `1px solid ${C.line}`, height: 380 }}>
                  <TrendChart data={trendData} brands={compareBrands} kpiId={trendKpi} />
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className="flex flex-wrap items-end gap-5 mb-5">
                  <div>
                    <div className="text-sm font-semibold mb-2" style={{ color: C.inkSoft }}>Mes del radar</div>
                    <div className="flex gap-2">{MONTH_KEYS.map((mk) => <button key={mk} onClick={() => setRadarMonth(mk)} className="rounded-full px-3 py-1.5 text-sm font-semibold" style={{ background: radarMonth === mk ? C.ink : C.card, color: radarMonth === mk ? C.cremeLight : C.inkSoft, border: `1px solid ${radarMonth === mk ? C.ink : C.line}` }}>{MONTHS[mk].label}</button>)}</div>
                  </div>
                  <div className="flex-1 min-w-[260px]">
                    <div className="text-sm font-semibold mb-2" style={{ color: C.inkSoft }}>KPIs en el radar (entre 3 y 6)</div>
                    <div className="flex flex-wrap gap-2">{KPIS.map((k) => <Chip key={k.id} active={radarKpis.includes(k.id)} color={GROUP_COLOR[k.group]} onClick={() => toggleRadarKpi(k.id)}>{k.label}</Chip>)}</div>
                  </div>
                </div>
                <div className="grid md:grid-cols-2 gap-4">
                  <div className="rounded-xl p-4" style={{ background: C.card, border: `1px solid ${C.line}`, height: 480 }}>
                    <RadarChartCustom rows={radarData.rows} brands={compareBrands} />
                  </div>
                  <div className="rounded-xl p-4 lk-scroll overflow-auto" style={{ background: C.card, border: `1px solid ${C.line}`, maxHeight: 480 }}>
                    <div className="text-sm font-semibold mb-2" style={{ color: C.inkSoft }}>Valores reales</div>
                    <table className="text-xs w-full" style={{ borderCollapse: "collapse" }}>
                      <thead><tr><th className="text-left py-1" style={{ color: C.inkFaint }}>KPI</th>{compareBrands.map((id) => <th key={id} className="text-right py-1 px-2" style={{ color: BRAND_COLOR[id] }}>{BRANDS.find((b) => b.id === id)?.name}</th>)}</tr></thead>
                      <tbody>{radarData.rows.map((row, i) => (
                        <tr key={i}><td className="py-1" style={{ color: C.ink }}>{row.kpi}</td>{compareBrands.map((id) => <td key={id} className="text-right py-1 px-2 font-mono">{radarData.raw[row.kpi]?.[id] ?? "–"}</td>)}</tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>
              </React.Fragment>
            )}
          </React.Fragment>
        )}

        <div className="text-xs mt-8 pt-4" style={{ color: C.inkFaint, borderTop: `1px solid ${C.line}` }}>
          Datos fijos en esta página — {MONTH_KEYS.map((mk) => MONTHS[mk].label).join(" y ")}. Todas las personas que abran este link ven exactamente lo mismo. Para sumar un mes nuevo, volvé al chat de Claude con el CSV actualizado y subí el HTML que te regenere.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PasswordGate><App /></PasswordGate>);
</script>
